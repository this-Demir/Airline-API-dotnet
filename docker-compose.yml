version: "3.8"

# ── Load Testing Observability Stack ─────────────────────────────────────────
#
# Services:
#   influxdb  — Time-series store for k6 metrics (port 8086)
#   grafana   — Dashboard UI with anonymous admin access (port 3000)
#
# Usage:
#   docker compose up -d
#   k6 run --out influxdb=http://localhost:8086/k6 load-tests/script.js
#
# Grafana setup (first run):
#   1. Open http://localhost:3000
#   2. Add InfluxDB datasource: URL = http://influxdb:8086, Database = k6
#   3. Import dashboard ID 2587 (official k6 dashboard from grafana.com)

networks:
  monitoring:
    driver: bridge

volumes:
  influxdb_data:
  grafana_data:

services:
  influxdb:
    image: influxdb:1.8
    container_name: k6_influxdb
    ports:
      - "8086:8086"
    networks:
      - monitoring
    volumes:
      - influxdb_data:/var/lib/influxdb
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: k6_grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
