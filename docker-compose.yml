version: "3.8"

# ── Load Testing Observability Stack ─────────────────────────────────────────
#
# Services:
#   influxdb  — Time-series store for k6 metrics (port 8086)
#   grafana   — Dashboard UI with anonymous admin access (port 3000)
#
# Usage:
#   docker compose up -d
#   k6 run --out influxdb=http://localhost:8086/k6 load-tests/script.js
#
# Grafana setup (first run):
#   1. Open http://localhost:3000
#   2. Add InfluxDB datasource: URL = http://influxdb:8086, Database = k6
#   3. Import dashboard ID 2587 (official k6 dashboard from grafana.com)

networks:
  monitoring:
    driver: bridge
  app:
    driver: bridge

volumes:
  influxdb_data:
  grafana_data:
  mysql_data:

services:
  # ── Application Stack ─────────────────────────────────────────────────────
  #
  # Zero Trust topology:
  #   gateway-api (port 5000) → backend-api (no host port) → mysql (no host port)
  #
  # Before starting: create a .env file at the solution root with:
  #   JWT_SECRET=<your-32-char-secret>
  #   MYSQL_ROOT_PASSWORD=<root-password>
  #   MYSQL_PASSWORD=<app-user-password>

  mysql:
    image: mysql:8.0
    container_name: airline_mysql
    networks: [ app ]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: AirlineSystemDb
      MYSQL_USER: airline_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-airlinepassword}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-api:
    build:
      context: .
      dockerfile: src/AirlineSystem.API/Dockerfile
    container_name: airline_backend
    networks: [ app ]
    # NO ports exposed — completely isolated from the host.
    # All traffic must enter via gateway-api on port 5000.
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=AirlineSystemDb;User=airline_user;Password=${MYSQL_PASSWORD:-airlinepassword};"
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: AirlineSystem.API
      JwtSettings__Audience: AirlineSystem.Client
      JwtSettings__ExpiryMinutes: 60
      SeedAdmin__Email: ${ADMIN_EMAIL}
      SeedAdmin__Password: ${ADMIN_PASSWORD}

  gateway-api:
    build:
      context: .
      dockerfile: src/AirlineSystem.Gateway/Dockerfile
    container_name: airline_gateway
    networks: [ app ]
    ports:
      - "5000:80"
    depends_on:
      - backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production

  # ── Load Testing Observability Stack ─────────────────────────────────────
  influxdb:
    image: influxdb:1.8
    container_name: k6_influxdb
    ports:
      - "8086:8086"
    networks:
      - monitoring
    volumes:
      - influxdb_data:/var/lib/influxdb
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: k6_grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
